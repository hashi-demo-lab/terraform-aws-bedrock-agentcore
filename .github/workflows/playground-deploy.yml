name: Deploy SDD Playground

on:
  push:
    branches: [main]
    paths:
      - '.foundations/design/sdd-workflow-playground.html'
      - '.github/workflows/playground-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Vercel API
        id: deploy
        run: |
          # Read the HTML file and encode it as base64
          FILE_CONTENT=$(base64 -w 0 .foundations/design/sdd-workflow-playground.html)
          FILE_SIZE=$(stat --format=%s .foundations/design/sdd-workflow-playground.html)
          FILE_SHA=$(sha1sum .foundations/design/sdd-workflow-playground.html | cut -d' ' -f1)

          # Create deployment via Vercel API
          RESPONSE=$(curl -s --fail-with-body -X POST "https://api.vercel.com/v13/deployments?teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- << PAYLOAD
          {
            "name": "vercel-iac-content",
            "target": "production",
            "projectSettings": {
              "framework": null
            },
            "files": [
              {
                "file": "index.html",
                "data": "$FILE_CONTENT",
                "encoding": "base64"
              },
              {
                "file": "vercel.json",
                "data": "$(echo '{"rewrites":[{"source":"/","destination":"/index.html"}]}' | base64 -w 0)",
                "encoding": "base64"
              }
            ]
          }
          PAYLOAD
          )

          DEPLOY_URL=$(echo "$RESPONSE" | jq -r '.url')
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed to: https://$DEPLOY_URL"
          echo "Deployment ID: $DEPLOY_ID"

      - name: Reassign tfai.vercel.app alias
        run: |
          DEPLOY_ID="${{ steps.deploy.outputs.deploy_id }}"
          RESULT=$(curl -s --fail-with-body -X POST \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"alias": "tfai.vercel.app"}' \
            "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases?teamId=${{ secrets.VERCEL_ORG_ID }}")
          echo "$RESULT" | jq .
          echo "Alias tfai.vercel.app reassigned to deployment $DEPLOY_ID"
